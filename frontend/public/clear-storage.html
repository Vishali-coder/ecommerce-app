<!DOCTYPE html>
<html>
<head>
    <title>Clear Storage</title>
</head>
<body>
    <h1>Clear localStorage</h1>
    <button onclick="clearStorage()">Clear All localStorage</button>
    <div id="result"></div>
    
    <script>
        function clearStorage() {
            try {
                localStorage.clear();
                document.getElementById('result').innerHTML = '<p style="color: green;">localStorage cleared successfully!</p>';
            } catch (error) {
                document.getElementById('result').innerHTML = '<p style="color: red;">Error: ' + error.message + '</p>';
            }
        }
        
        // Show current localStorage content
        console.log('Current localStorage:', localStorage);
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            console.log(key + ':', localStorage.getItem(key));
        }
    </script>
</body>
</html>
