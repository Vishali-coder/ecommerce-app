<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce API Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            background: #f9f9f9;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .loading {
            background: #cce7ff;
            color: #004085;
            border: 1px solid #b3d7ff;
        }
        .endpoint-info {
            background: #e8f4f8;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 E-Commerce API Connection Test</h1>
        
        <div class="test-section">
            <h3>📦 Products API Test</h3>
            <div class="endpoint-info">GET http://localhost:9092/api/products</div>
            <button onclick="testProducts()">Test Products API</button>
            <div id="products-result" class="result"></div>
        </div>

        <div class="test-section">
            <h3>🔐 Auth API Tests</h3>
            <div class="endpoint-info">POST http://localhost:9092/api/auth/register</div>
            <button onclick="testRegister()">Test Registration</button>
            <div id="register-result" class="result"></div>
            
            <div class="endpoint-info">POST http://localhost:9092/api/auth/login</div>
            <button onclick="testLogin()">Test Login</button>
            <div id="login-result" class="result"></div>
        </div>

        <div class="test-section">
            <h3>🌐 CORS & Connection Status</h3>
            <button onclick="testCORS()">Test CORS Configuration</button>
            <div id="cors-result" class="result"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:9092/api';

        async function makeRequest(url, options = {}) {
            const defaultOptions = {
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                mode: 'cors'
            };
            
            return fetch(url, { ...defaultOptions, ...options });
        }

        async function testProducts() {
            const resultDiv = document.getElementById('products-result');
            resultDiv.className = 'result loading';
            resultDiv.textContent = '🔄 Testing products API...';
            
            try {
                const response = await makeRequest(`${API_BASE}/products`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const products = await response.json();
                
                resultDiv.className = 'result success';
                resultDiv.textContent = `✅ SUCCESS!
Status: ${response.status} ${response.statusText}
Products found: ${products.length}
Sample product: ${JSON.stringify(products[0], null, 2)}`;
                
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = `❌ FAILED!
Error: ${error.message}
Check if backend is running on port 9092`;
            }
        }

        async function testRegister() {
            const resultDiv = document.getElementById('register-result');
            resultDiv.className = 'result loading';
            resultDiv.textContent = '🔄 Testing registration API...';
            
            const testUser = {
                email: `test${Date.now()}@example.com`,
                password: 'testpass123'
            };
            
            try {
                const response = await makeRequest(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    body: JSON.stringify(testUser)
                });
                
                const responseText = await response.text();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = `✅ REGISTRATION SUCCESS!
Status: ${response.status}
Response: ${responseText}
Test user: ${testUser.email}`;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = `⚠️ Registration failed (expected if user exists)
Status: ${response.status}
Response: ${responseText}`;
                }
                
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = `❌ FAILED!
Error: ${error.message}`;
            }
        }

        async function testLogin() {
            const resultDiv = document.getElementById('login-result');
            resultDiv.className = 'result loading';
            resultDiv.textContent = '🔄 Testing login API...';
            
            const testUser = {
                email: 'test@example.com',
                password: 'wrongpassword'
            };
            
            try {
                const response = await makeRequest(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    body: JSON.stringify(testUser)
                });
                
                const responseText = await response.text();
                
                resultDiv.className = 'result success';
                resultDiv.textContent = `✅ LOGIN API ACCESSIBLE!
Status: ${response.status}
Response: ${responseText}
Note: Expected to fail with wrong credentials`;
                
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = `❌ FAILED!
Error: ${error.message}`;
            }
        }

        async function testCORS() {
            const resultDiv = document.getElementById('cors-result');
            resultDiv.className = 'result loading';
            resultDiv.textContent = '🔄 Testing CORS configuration...';
            
            try {
                // Test OPTIONS request (preflight)
                const optionsResponse = await fetch(`${API_BASE}/products`, {
                    method: 'OPTIONS',
                    headers: {
                        'Origin': window.location.origin,
                        'Access-Control-Request-Method': 'GET',
                        'Access-Control-Request-Headers': 'Content-Type'
                    }
                });
                
                const corsHeaders = {
                    'Access-Control-Allow-Origin': optionsResponse.headers.get('Access-Control-Allow-Origin'),
                    'Access-Control-Allow-Methods': optionsResponse.headers.get('Access-Control-Allow-Methods'),
                    'Access-Control-Allow-Headers': optionsResponse.headers.get('Access-Control-Allow-Headers')
                };
                
                resultDiv.className = 'result success';
                resultDiv.textContent = `✅ CORS TEST COMPLETE!
OPTIONS Status: ${optionsResponse.status}
Current Origin: ${window.location.origin}
CORS Headers:
${JSON.stringify(corsHeaders, null, 2)}`;
                
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = `❌ CORS TEST FAILED!
Error: ${error.message}`;
            }
        }

        // Auto-test products on page load
        window.onload = function() {
            testProducts();
        };
    </script>
</body>
</html>
